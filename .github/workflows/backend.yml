name: Backend CI

on:
  push:
    branches: [main, develop]
    paths-ignore: ['frontend/**', '*.md']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finsight_user
          POSTGRES_PASSWORD: finsight_password
          POSTGRES_DB: finsight_db
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U finsight_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        run: mvn -B -ntp clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - workflow-service
          - document-service
          - ai-service
          - auth-service
          - api-gateway
          - config-server
          - discovery-server
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image (${{ matrix.service }})
        run: docker build -t finsight/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}
