spring:
  application:
    name: ai-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finsight_db}
    username: ${DB_USER:finsight_user}
    password: ${DB_PASSWORD:finsight_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${GROQ_BASE_URL:${OPENAI_BASE_URL:https://api.groq.com/openai/v1}}
      chat:
        options:
          model: ${GROQ_MODEL:${OPENAI_MODEL:llama3-8b-8192}}
          temperature: 0.1

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
