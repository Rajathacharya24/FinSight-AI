spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:auth-service}:${AUTH_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /auth/${segment}

        - id: document-service
          uri: http://${DOCUMENT_SERVICE_HOST:document-service}:${DOCUMENT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/v1/documents/**

        - id: ai-service
          uri: http://${AI_SERVICE_HOST:ai-service}:${AI_SERVICE_PORT:8083}
          predicates:
            - Path=/api/v1/extract/**

        - id: workflow-service
          uri: http://${WORKFLOW_SERVICE_HOST:workflow-service}:${WORKFLOW_SERVICE_PORT:8084}
          predicates:
            - Path=/api/v1/workflows/**,/api/v1/analytics/**

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
