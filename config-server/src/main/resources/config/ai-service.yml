server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/finsight_db?currentSchema=ai
    username: finsight_user
    password: finsight_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ai

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.1

  flyway:
    enabled: true
    schemas: ai
    default-schema: ai
    create-schemas: true
    locations: classpath:db/migration
