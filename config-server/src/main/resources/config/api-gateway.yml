server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      cors-configurations:
        '[/**]':
          allowedOrigins:
            - "http://localhost:3000"
            - "http://localhost:5173"
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders: "*"
          allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"

        - id: document-service
          uri: lb://document-service
          predicates:
            - Path=/api/v1/documents/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/v1/extract/**

        - id: workflow-service
          uri: lb://workflow-service
          predicates:
            - Path=/api/v1/workflows/**,/api/v1/analytics/**

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
