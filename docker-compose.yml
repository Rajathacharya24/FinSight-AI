version: '3.8'

services:
  # ─────────────── Data Stores ───────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finsight-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_password}
      POSTGRES_DB: ${POSTGRES_DB:-finsight_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight_user} -d ${POSTGRES_DB:-finsight_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: finsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── Messaging ───────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsight-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsight-kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────── Observability ───────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: finsight-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: finsight-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: finsight-zipkin
    ports:
      - "9411:9411"

  # ─────────────── Infrastructure ───────────────
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: finsight-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: finsight-discovery-server
    ports:
      - "8761:8761"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: finsight-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────── Core Services ───────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: finsight-auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: finsight-postgres
      DB_NAME: finsight_db
      DB_USER: finsight_user
      DB_PASSWORD: finsight_password
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://discovery-server:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    container_name: finsight-document-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: finsight-postgres
      DB_NAME: finsight_db
      DB_USER: finsight_user
      DB_PASSWORD: finsight_password
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://discovery-server:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: finsight-ai-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: finsight-postgres
      DB_NAME: finsight_db
      DB_USER: finsight_user
      DB_PASSWORD: finsight_password
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://discovery-server:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  workflow-service:
    build:
      context: .
      dockerfile: workflow-service/Dockerfile
    container_name: finsight-workflow-service
    ports:
      - "8084:8084"
    environment:
      DB_HOST: finsight-postgres
      DB_NAME: finsight_db
      DB_USER: finsight_user
      DB_PASSWORD: finsight_password
      CONFIG_SERVER_URL: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://discovery-server:8761/eureka
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      DOCUMENT_SERVICE_URL: http://document-service:8082
      AI_SERVICE_URL: http://ai-service:8083
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started

  # ─────────────── Frontend ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finsight-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api-gateway

volumes:
  pgdata:
  redisdata:
  grafanadata:
